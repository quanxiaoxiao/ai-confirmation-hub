<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Confirmation Hub</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 380px;
      min-height: 200px;
      max-height: 520px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      background: #fafafa;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      background: #1e293b;
      color: #fff;
    }
    .header h1 {
      font-size: 14px;
      font-weight: 600;
    }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      display: inline-block;
    }
    .status-dot.ok { background: #4CAF50; }
    .status-dot.err { background: #F44336; }
    .status-dot.off { background: #999; }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      background: #f1f5f9;
      border-bottom: 1px solid #e2e8f0;
      font-size: 12px;
      color: #64748b;
    }
    .toolbar button {
      font-size: 11px;
      padding: 3px 8px;
      border: 1px solid #cbd5e1;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
      color: #334155;
    }
    .toolbar button:hover { background: #e2e8f0; }

    .event-list {
      overflow-y: auto;
      max-height: 400px;
    }
    .event-card {
      padding: 10px 14px;
      border-bottom: 1px solid #e2e8f0;
      cursor: default;
    }
    .event-card:hover { background: #f1f5f9; }

    .event-top {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
    }
    .tool-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 1px 6px;
      border-radius: 3px;
      text-transform: uppercase;
    }
    .tool-badge.codex { background: #dbeafe; color: #1e40af; }
    .tool-badge.claude { background: #fce7f3; color: #9d174d; }
    .tool-badge.opencode { background: #d1fae5; color: #065f46; }
    .tool-badge.unknown { background: #f1f5f9; color: #64748b; }

    .risk-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 3px;
      text-transform: uppercase;
    }
    .risk-badge.low { background: #dcfce7; color: #166534; }
    .risk-badge.medium { background: #fef9c3; color: #854d0e; }
    .risk-badge.high { background: #fee2e2; color: #991b1b; }
    .risk-badge.critical { background: #991b1b; color: #fff; }

    .event-kind {
      font-size: 12px;
      color: #475569;
    }
    .event-summary {
      font-size: 12px;
      color: #64748b;
      margin-top: 2px;
    }
    .event-source {
      font-size: 11px;
      color: #94a3b8;
      margin-top: 3px;
    }
    .event-actions {
      display: flex;
      gap: 4px;
      margin-top: 6px;
    }
    .event-actions button {
      font-size: 11px;
      padding: 2px 8px;
      border: 1px solid #cbd5e1;
      border-radius: 3px;
      background: #fff;
      cursor: pointer;
      color: #475569;
    }
    .event-actions button:hover { background: #e2e8f0; }
    .event-actions button.resolve-btn { border-color: #86efac; color: #166534; }
    .event-actions button.resolve-btn:hover { background: #dcfce7; }
    .event-actions button.focus-btn { border-color: #93c5fd; color: #1e40af; font-weight: 600; }
    .event-actions button.focus-btn:hover { background: #dbeafe; }

    /* Tabs */
    .tabs {
      display: flex;
      border-bottom: 1px solid #e2e8f0;
      background: #f8fafc;
    }
    .tab-btn {
      flex: 1;
      padding: 8px 0;
      font-size: 12px;
      font-weight: 500;
      text-align: center;
      border: none;
      background: none;
      color: #64748b;
      cursor: pointer;
      border-bottom: 2px solid transparent;
    }
    .tab-btn:hover { color: #334155; }
    .tab-btn.active {
      color: #1e293b;
      border-bottom-color: #3b82f6;
    }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Panes panel */
    .pane-card {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-bottom: 1px solid #e2e8f0;
    }
    .pane-card:hover { background: #f1f5f9; }
    .pane-info {
      flex: 1;
      min-width: 0;
    }
    .pane-target {
      font-size: 12px;
      font-weight: 500;
      color: #1e293b;
    }
    .pane-window-name {
      font-size: 11px;
      color: #94a3b8;
    }
    .pane-summary {
      font-size: 11px;
      color: #64748b;
      padding: 6px 14px;
      background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
    }

    .empty {
      text-align: center;
      padding: 40px 14px;
      color: #94a3b8;
    }
    .empty .emoji { font-size: 32px; display: block; margin-bottom: 8px; }

    .error-banner {
      padding: 8px 14px;
      background: #fef2f2;
      color: #991b1b;
      font-size: 12px;
      border-bottom: 1px solid #fecaca;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>AI Confirmation Hub</h1>
    <span id="statusDot" class="status-dot off"></span>
  </div>
  <div id="errorBanner" class="error-banner" style="display:none"></div>
  <div class="tabs">
    <button class="tab-btn active" data-tab="events">Events</button>
    <button class="tab-btn" data-tab="panes">Panes</button>
  </div>
  <div id="eventsPanel" class="tab-panel active">
    <div class="toolbar">
      <span id="eventCount">--</span>
      <span style="flex:1"></span>
      <button id="refreshBtn">Refresh</button>
    </div>
    <div id="eventList" class="event-list"></div>
  </div>
  <div id="panesPanel" class="tab-panel">
    <div id="paneList" class="event-list"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
